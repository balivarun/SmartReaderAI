# Spring datasource (Postgres). Use environment variables for credentials.
# For local development a default local database URL is provided. In production
# set the DATABASE_URL (or SPRING_DATASOURCE_URL) and DATABASE_USER / DATABASE_PASSWORD
# environment variables. The application accepts either a JDBC URL (jdbc:postgresql://...)
# or a RFC-1738 style URL (postgres://user:pass@host:port/dbname).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/smartreaderai}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server port
server.port=8080

# JWT secret (override in production via env var)
app.jwt.secret=${JWT_SECRET:NEwpaOuGQaeDzvzqQc3tOUsUI0cimmIGc5Gs4A02b6G}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Allow file uploads up to 20MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
